services:
  backend:
    build:
      context: ./backend
    container_name: apuguard-backend
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apuguard-network

  db:
    image: postgres:17-alpine
    container_name: apuguard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - apuguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apuguard-network

  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: apuguard-juice-shop
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - apuguard-network

  zap:
    image: zaproxy/zap-stable:latest
    container_name: apuguard-zap
    restart: unless-stopped
    command:
      - zap.sh
      - -daemon
      - -host
      - 0.0.0.0
      - -port
      - "8080"
      - -config
      - api.disablekey=true
      - -config
      - "api.addrs.addr.name=.*"
      - -config
      - api.addrs.addr.regex=true
    ports:
      - "8080:8080"
    depends_on:
      - juice-shop
    networks:
      - apuguard-network

volumes:
  apuguard_postgres_data:

networks:
  apuguard-network:
    driver: bridge